<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home — ESGUERRA</title>
  <link rel="stylesheet" href="css/general.css">
  <link rel="stylesheet" href="css/header.css">
  <link rel="stylesheet" href="css/home.css">
</head>
<body>

 <header class="header-section">
    <h1 class="name">ESGUERRA <span>Website</span></h1>

    <!-- Desktop nav -->
    <nav><a class="active" href="index.html">Home</a></nav>
    <nav><a href="aboutme.html">About</a></nav>
    <nav><a href="projects.html">Projects</a></nav>
    <nav><a href="contact.html">Contact</a></nav>

    <!-- Hamburger button -->
    <button class="hamburger" id="hamburger" aria-label="Toggle menu">
      <span></span>
      <span></span>
      <span></span>
    </button>
  </header>

  <!-- Mobile nav drawer -->
  <div class="mobile-nav" id="mobileNav">
    <a class="active" href="index.html">Home</a>
    <a href="aboutme.html">About</a>
    <a href="projects.html">Projects</a>
    <a href="contact.html">Contact</a>
  </div>

  <div class="grid-container">

    <div class="left-side-text">
      <h1>Hi, I'm <span>Carlos Esguerra</span></h1>
      <p>Aspiring Website Developer</p>
      <div class="cta-group">
        <a href="projects.html" class="view-project">View Projects</a>
        <a href="contact.html"  class="contact">Contact Me</a>
      </div>
    </div>

    <div class="right-side-pic">
      <img src="img/picture-profile.jpg" alt="Carlos Esguerra">
    </div>

  </div>

</body>

<script>
    const hamburger = document.getElementById('hamburger');
    const mobileNav = document.getElementById('mobileNav');

    hamburger.addEventListener('click', () => {
      hamburger.classList.toggle('open');
      mobileNav.classList.toggle('open');
    });

    mobileNav.querySelectorAll('a').forEach(link => {
      link.addEventListener('click', () => {
        hamburger.classList.remove('open');
        mobileNav.classList.remove('open');
      });
    });
  </script>


</html>
